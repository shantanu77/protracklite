{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <div>
    <p class="eyebrow">Task</p>
    <h1>Create Task</h1>
  </div>
</section>
<form method="post" class="panel form-grid">
  <label>Project
    <select name="project_id" required>
      {% for project in projects %}
      <option value="{{ project.id }}">{{ project.name }} ({{ project.code }})</option>
      {% endfor %}
    </select>
  </label>
  <label>Name<input name="name" required></label>
  <label>Activity Type
    <select name="activity_type_id" required>
      {% for item in activity_types %}
      <option value="{{ item.id }}">{{ item.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Status
    <select name="status">
      {% for item in statuses %}
      <option value="{{ item.value }}">{{ item.value }}</option>
      {% endfor %}
    </select>
  </label>
  {% if user.role.value == "admin" %}
  <label>Assign To
    <select name="assigned_to">
      {% for person in people %}
      <option value="{{ person.id }}" {% if person.id == user.id %}selected{% endif %}>{{ person.full_name }}</option>
      {% endfor %}
    </select>
  </label>
  {% endif %}
  <label>Start Date<input name="start_date" type="date" required></label>
  <label>End Date<input name="end_date" type="date"></label>
  <label>Estimated Hours<input name="estimated_hours" type="number" step="0.25" min="0"></label>
  <label class="checkbox"><input name="is_private" type="checkbox">Private task</label>
  <label class="full">Description<textarea name="description" rows="8"></textarea></label>
  <button type="submit">Save Task</button>
</form>
{% endblock %}
