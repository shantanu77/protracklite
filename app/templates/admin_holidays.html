{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <div>
    <p class="eyebrow">Admin</p>
    <h1>Holidays</h1>
  </div>
</section>
<div class="grid two">
  <form method="post" class="panel form-grid">
    <h2 class="full">Add Holiday</h2>
    <label>Date<input type="date" name="holiday_date" required></label>
    <label>Name<input name="name" required></label>
    <button type="submit">Add Holiday</button>
  </form>
  <section class="panel">
    <h2>Holiday Calendar</h2>
    {% for holiday in holidays %}
    <form method="post" action="/{{ org.slug }}/admin/holidays/{{ holiday.id }}/delete" class="list-row holiday-row">
      <strong>{{ holiday.holiday_date }}</strong>
      <span>{{ holiday.name }}</span>
      <button type="submit" class="danger-button">Delete</button>
    </form>
    {% else %}
    <p class="empty">No holidays configured.</p>
    {% endfor %}
  </section>
</div>
{% endblock %}
